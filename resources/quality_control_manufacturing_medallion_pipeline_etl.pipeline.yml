# The main pipeline for quality_control_manufacturing_medallion_pipeline

resources:
  pipelines:
    quality_control_manufacturing_medallion_pipeline_etl:
      name: quality_control_manufacturing_medallion_pipeline_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/quality_control_manufacturing_medallion_pipeline_etl"

      libraries:
        - glob:
            include: ../src/quality_control_manufacturing_medallion_pipeline_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
